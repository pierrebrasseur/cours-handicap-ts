site_name: Handicap, autonomie et travail social
site_description: Module Bachelor TS · HETS Genève · Pierre Brasseur · Leçon probatoire du 5 juin 2026
site_author: Pierre Brasseur
site_url: https://pierrebrasseur.github.io/cours-handicap-ts/
copyright: "© 2026 Pierre Brasseur · HETS Genève — Contenu sous CC BY-NC-SA 4.0"

theme:
  name: material
  language: fr
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Mode clair
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - announce.dismiss
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    annotation: material/arrow-right-circle

extra_css:
  - assets/extra.css

markdown_extensions:
  - footnotes
  - admonition
  - attr_list
  - md_in_html
  - tables
  - abbr
  - toc:
      permalink: ¶
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.keys
  - pymdownx.critic
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list

plugins:
  - search:
      lang: fr
      separator: '[\s\-\.]'
  - social:
      cards_layout_options:
        background_color: "#5e2ca5"
        color: "#ffffff"
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - tags

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:pierre.brasseur@hetsge.ch
      name: Contact
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/
      name: ORCID
  generator: false
  analytics:
    feedback:
      title: Cette page vous a-t-elle été utile ?
      ratings:
        - icon: material/emoticon-happy-outline
          name: Oui
          data: 1
          note: Merci !
        - icon: material/emoticon-sad-outline
          name: Non
          data: 0
          note: Aidez-nous à améliorer cette page — écrivez à pierre.brasseur@hetsge.ch

nav:
  - Accueil: index.md
  - Séance probatoire (5 juin):
    - Présentation: seance/presentation.md
    - Vignette de Léa: seance/vignette.md
    - Quatre modèles du handicap: seance/modeles.md
    - Transformations contemporaines: seance/transformations.md
    - Trois tensions de posture: seance/tensions.md
    - Activité et synthèse: seance/activite-synthese.md
  - Module complet:
    - Syllabus du module: module/syllabus.md
    - 13 séances détaillées: module/seances.md
    - Évaluation: module/evaluation.md
  - Ressources:
    - Notes de lecture (64 fiches): ressources/notes-lecture.md
    - Bibliographie complète: ressources/bibliographie.md
    - Cadre suisse et genevois: ressources/cadre-suisse.md
    - Glossaire: ressources/glossaire.md
    - Galerie de schémas: ressources/galerie.md
    - Téléchargements: ressources/telechargements.md
  - À propos: about.md
